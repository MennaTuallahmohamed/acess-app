name: access_track
description: نظام التفتيش الميداني الإلكتروني - وزارة التنمية المحلية
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  go_router: ^13.2.0

  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  flutter_secure_storage: ^9.0.0
  jwt_decoder: ^2.0.1

  mobile_scanner: ^5.1.0

  geolocator: ^11.0.0
  geocoding: ^3.0.0

  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  hive_flutter: ^1.1.0
  hive: ^2.2.3

  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  intl: ^0.20.2

  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  uuid: ^4.4.0
  crypto: ^3.0.3
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700